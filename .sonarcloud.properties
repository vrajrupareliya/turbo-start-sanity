# SonarQube Cloud Automatic Analysis reads THIS file (.sonarcloud.properties) on
# the default branch. It ignores sonar-project.properties, which is only read by
# CI-based scanner runs, which is why exclusions placed there never took effect.
#
# packages/sanity/src/sanity.types.ts is fully generated by `sanity typegen
# generate` and is never hand-edited. Its repetitive type declarations inflate the
# duplication metric and fail the Quality Gate, so exclude it from analysis.
sonar.exclusions=packages/sanity/src/sanity.types.ts
sonar.cpd.exclusions=packages/sanity/src/sanity.types.ts
